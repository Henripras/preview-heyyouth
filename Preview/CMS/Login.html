<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login - Hey Youth!</title>
    <meta name="robots" content="noindex, nofollow">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1D4ED8',
                        primaryDark: '#1e40af',
                        accent: '#F59E0B',
                        bg: '#F8FAFC',
                        heading: '#0F172A',
                        body: '#475569',
                        surface: '#EFF6FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    },
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../style.css">

    <style>
        body.login-page {
            overflow: hidden;
        }

        .input-group {
            position: relative;
        }
        .input-group input {
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-group input:focus {
            border-color: #1D4ED8;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.12);
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }
        .blob-1 { animation: drift 20s ease-in-out infinite; }
        .blob-2 { animation: drift 25s ease-in-out infinite reverse; }
        .blob-3 { animation: drift 18s ease-in-out infinite 5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-8px); }
            30% { transform: translateX(8px); }
            45% { transform: translateX(-6px); }
            60% { transform: translateX(6px); }
            75% { transform: translateX(-3px); }
            90% { transform: translateX(3px); }
        }
        .shake { animation: shake 0.5s ease-in-out; }
    </style>
</head>

<body class="login-page bg-bg text-body font-sans antialiased">

    <div class="fixed inset-0 flex">

        <!-- Left: Decorative Panel -->
        <div class="hidden lg:flex lg:w-1/2 relative bg-gradient-to-br from-primary via-blue-700 to-primaryDark overflow-hidden">
            <div class="blob-1 absolute top-10 left-10 w-72 h-72 bg-white/10 rounded-full blur-3xl"></div>
            <div class="blob-2 absolute bottom-20 right-10 w-96 h-96 bg-accent/10 rounded-full blur-3xl"></div>
            <div class="blob-3 absolute top-1/2 left-1/3 w-48 h-48 bg-blue-400/10 rounded-full blur-3xl"></div>
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>

            <div class="relative z-10 flex flex-col justify-between p-12 text-white w-full">
                <div>
                    <a href="../Index.html" class="inline-block">
                        <img src="../img/NEW HEY YOUTH Sep 2025.png" alt="Hey Youth Logo" class="h-10 w-auto object-contain">
                    </a>
                </div>

                <div class="max-w-md">
                    <h1 class="text-4xl xl:text-5xl font-extrabold leading-tight mb-6 font-serif">
                        Admin Dashboard
                    </h1>
                    <p class="text-blue-100 text-lg leading-relaxed">
                        Kelola kegiatan, relawan, dan konten organisasi dari satu tempat. Akses terbatas hanya untuk tim inti Hey Youth.
                    </p>
                </div>

                <div class="flex items-center gap-8 text-blue-200 text-sm">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-shield-alt text-accent"></i>
                        <span>SSL Secured</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fas fa-lock text-accent"></i>
                        <span>Encrypted</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fas fa-user-shield text-accent"></i>
                        <span>Authorized Only</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Login Form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-10 relative">
            <div class="lg:hidden absolute top-0 right-0 w-64 h-64 bg-blue-100 rounded-full blur-3xl opacity-30"></div>
            <div class="lg:hidden absolute bottom-0 left-0 w-48 h-48 bg-yellow-100 rounded-full blur-3xl opacity-30"></div>

            <div class="relative z-10 w-full max-w-md">
                <!-- Mobile logo -->
                <div class="lg:hidden mb-10 text-center">
                    <a href="../Index.html" class="inline-block">
                        <img src="../img/NEW HEY YOUTH Sep 2025.png" alt="Hey Youth Logo" class="h-10 w-auto object-contain mx-auto">
                    </a>
                </div>

                <!-- Login Card -->
                <div id="login-card">
                    <div class="mb-8">
                        <h2 class="text-2xl lg:text-3xl font-bold text-heading mb-2">Welcome back</h2>
                        <p class="text-body">Masuk ke panel admin Hey Youth.</p>
                    </div>

                    <form id="login-form" class="space-y-5" autocomplete="off">
                        <!-- Email -->
                        <div class="input-group">
                            <label for="email" class="block text-sm font-semibold text-heading mb-1.5">Email</label>
                            <div class="relative">
                                <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-envelope text-sm"></i></span>
                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    placeholder="admin@heyouth.id"
                                    required
                                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-heading text-sm bg-white placeholder-gray-400 focus:outline-none"
                                >
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="input-group">
                            <label for="password" class="block text-sm font-semibold text-heading mb-1.5">Password</label>
                            <div class="relative">
                                <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-lock text-sm"></i></span>
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    placeholder="••••••••"
                                    required
                                    minlength="6"
                                    class="w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl text-heading text-sm bg-white placeholder-gray-400 focus:outline-none"
                                >
                                <button type="button" id="toggle-password" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors" aria-label="Toggle password visibility">
                                    <i class="fas fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Remember + Forgot -->
                        <div class="flex items-center justify-between">
                            <label class="flex items-center gap-2 cursor-pointer select-none">
                                <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary accent-primary">
                                <span class="text-sm text-body">Ingat saya</span>
                            </label>
                            <a href="#" class="text-sm text-primary font-medium hover:text-primaryDark transition-colors">Lupa password?</a>
                        </div>

                        <!-- Error message -->
                        <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 flex items-center gap-2">
                            <i class="fas fa-exclamation-circle flex-shrink-0"></i>
                            <span id="error-text">Email atau password salah.</span>
                        </div>

                        <!-- Submit -->
                        <button
                            type="submit"
                            id="login-btn"
                            class="w-full bg-primary hover:bg-primaryDark text-white font-bold py-3.5 rounded-xl transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 focus:ring-2 focus:ring-offset-2 focus:ring-primary flex items-center justify-center gap-2"
                        >
                            <span id="btn-text">Masuk</span>
                            <i id="btn-spinner" class="fas fa-circle-notch fa-spin hidden"></i>
                            <i id="btn-arrow" class="fas fa-arrow-right text-sm"></i>
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="flex items-center gap-3 my-6">
                        <div class="flex-grow h-px bg-gray-200"></div>
                        <span class="text-xs text-gray-400 font-medium uppercase tracking-wider">atau</span>
                        <div class="flex-grow h-px bg-gray-200"></div>
                    </div>

                    <!-- Back to Home -->
                    <a href="../Index.html" class="w-full inline-flex items-center justify-center gap-2 py-3 border-2 border-gray-200 text-heading font-semibold rounded-xl hover:border-primary hover:text-primary transition-all bg-white text-sm">
                        <i class="fas fa-arrow-left text-xs"></i>
                        Kembali ke Beranda
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var form = document.getElementById('login-form');
            var emailInput = document.getElementById('email');
            var passwordInput = document.getElementById('password');
            var toggleBtn = document.getElementById('toggle-password');
            var errorMsg = document.getElementById('error-msg');
            var errorText = document.getElementById('error-text');
            var loginCard = document.getElementById('login-card');
            var loginBtn = document.getElementById('login-btn');
            var btnText = document.getElementById('btn-text');
            var btnSpinner = document.getElementById('btn-spinner');
            var btnArrow = document.getElementById('btn-arrow');

            if (!form) return;

            toggleBtn.addEventListener('click', function () {
                var type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                var icon = toggleBtn.querySelector('i');
                icon.classList.toggle('fa-eye');
                icon.classList.toggle('fa-eye-slash');
            });

            emailInput.addEventListener('input', hideError);
            passwordInput.addEventListener('input', hideError);

            function hideError() {
                errorMsg.classList.add('hidden');
                loginCard.classList.remove('shake');
            }

            function showError(msg) {
                errorText.textContent = msg;
                errorMsg.classList.remove('hidden');
                loginCard.classList.add('shake');
                setTimeout(function () {
                    loginCard.classList.remove('shake');
                }, 500);
            }

            function setLoading(loading) {
                loginBtn.disabled = loading;
                btnText.textContent = loading ? 'Memverifikasi...' : 'Masuk';
                btnSpinner.classList.toggle('hidden', !loading);
                btnArrow.classList.toggle('hidden', loading);
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                errorMsg.classList.add('hidden');

                var email = emailInput.value.trim();
                var password = passwordInput.value;

                if (!email || !password) {
                    showError('Mohon isi email dan password.');
                    return;
                }

                setLoading(true);

                setTimeout(function () {
                    setLoading(false);

                                if (email === 'admin@gmail.com' && password === 'admin123') {
                localStorage.setItem('hey_youth_auth', 'true');
                window.location.href = 'dashboard.html';
                    } else {
                        showError('Email atau password salah. Silakan coba lagi.');
                    }
                }, 1500);
            });
        })();
    </script>
</body>
</html>
